<!DOCTYPE html>
<html lang="sr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>My Words Trainer</title>

<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:Arial,sans-serif}
body{background:#0f172a;color:white;min-height:100vh}
.app{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:18px}
.card{width:100%;max-width:650px;background:#1e293b;border-radius:22px;padding:24px;text-align:center}
.title{font-size:24px;color:#38bdf8;font-weight:bold;margin-bottom:12px}
.tabs{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:18px}
.tabs button{background:#334155;color:white}
.tabs button.active{background:#38bdf8;color:#020617}
input,textarea{width:100%;padding:15px;border:none;border-radius:14px;font-size:18px;text-align:center;outline:none;margin-top:10px}
textarea{text-align:left;min-height:120px;resize:vertical}
button{width:100%;padding:14px;border:none;border-radius:14px;margin-top:10px;font-size:17px;font-weight:bold;cursor:pointer}
.green{background:#22c55e;color:#052e16}
.blue{background:#38bdf8;color:#020617}
.red{background:#ef4444;color:white}
.gray{background:#64748b;color:white}
.word{font-size:36px;font-weight:bold;margin:22px 0 10px;line-height:1.35}
.reading{font-size:22px;color:#94a3b8;margin-bottom:18px}
.counter,.hint{color:#94a3b8;margin-top:8px;line-height:1.4}
.result{margin-top:16px;min-height:70px}
.correct{color:#22c55e;font-weight:bold}
.wrong{color:#f87171;font-weight:bold}
.answer{color:#facc15;font-size:22px;margin-top:8px}
.score{margin-top:14px;color:#cbd5e1}
.list{background:#0f172a;border:1px solid #334155;border-radius:14px;padding:12px;margin-top:14px;text-align:left;max-height:260px;overflow:auto}
.item{display:flex;justify-content:space-between;gap:8px;border-bottom:1px solid #334155;padding:8px 0;color:#cbd5e1;align-items:center}
.item:last-child{border-bottom:none}
.item small{color:#94a3b8}
.status{margin-top:10px;color:#facc15;font-size:14px}
</style>
</head>

<body>

<div class="app">
<div class="card">

<div class="title">My Words Trainer</div>

<div class="tabs">
  <button id="tabAdd" class="active" onclick="showAdd()">➕ Unos reči</button>
  <button id="tabPractice" onclick="showPractice()">🎯 Vežbanje</button>
</div>

<div id="addScreen">
  <div class="hint">
    Reči se čuvaju u Google Sheet-u i rade na telefonu i računaru.
  </div>

  <input id="enInput" placeholder="English word, npr. garden">
  <input id="readInput" placeholder="Kako se čita, npr. ˈɡärdən">
  <input id="srInput" placeholder="Srpski prevod, npr. bašta">

  <button class="green" onclick="addWord()">Sačuvaj u Google Sheet</button>
  <button class="blue" onclick="loadWords()">🔄 Učitaj reči iz Google Sheet-a</button>

  <textarea id="bulkInput" placeholder="Može i više reči odjednom:
garden | ˈɡärdən | bašta
driver | ˈdraɪvər | vozač
company | ˈkʌmpəni | kompanija"></textarea>

  <button class="blue" onclick="addBulk()">Ubaci listu u Google Sheet</button>

  <div class="status" id="status"></div>
  <div class="list" id="wordList"></div>
</div>

<div id="practiceScreen" style="display:none">
  <div class="counter" id="counter"></div>
  <div class="hint" id="directionText"></div>

  <div class="word" id="word">Nema reči</div>
  <div class="reading" id="reading"></div>

  <input id="answer" placeholder="upiši odgovor">

  <button class="green" onclick="checkAnswer()">Check</button>
  <button class="blue" id="nextBtn" onclick="nextWord()" style="display:none">Next</button>

  <div class="result" id="result"></div>
  <div class="score" id="score"></div>

  <button class="gray" onclick="restartPractice()">Promešaj ponovo</button>
  <button class="blue" onclick="loadWords()">🔄 Refresh words</button>
</div>

</div>
</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbwBcQemHOmXVcITCEJXl-UsTcFMqjzNk2F2DZVP_w6Cjo340SIxcewOyLoHcIV0dAFe3w/exec";

let words = [];
let practiceWords = [];
let index = 0;
let correct = 0;
let wrong = 0;
let answered = false;
let direction = "en-sr";

function setStatus(text){
  document.getElementById("status").innerText = text;
}

function normalize(text){
  return text.toLowerCase().trim()
    .replace(/č/g,"c").replace(/ć/g,"c").replace(/š/g,"s")
    .replace(/đ/g,"dj").replace(/ž/g,"z")
    .replace(/[.!?,]/g,"")
    .replace(/\s+/g," ");
}

function showAdd(){
  document.getElementById("addScreen").style.display="block";
  document.getElementById("practiceScreen").style.display="none";
  document.getElementById("tabAdd").classList.add("active");
  document.getElementById("tabPractice").classList.remove("active");
  renderList();
}

function showPractice(){
  document.getElementById("addScreen").style.display="none";
  document.getElementById("practiceScreen").style.display="block";
  document.getElementById("tabPractice").classList.add("active");
  document.getElementById("tabAdd").classList.remove("active");
  restartPractice();
}

async function loadWords(){
  try{
    setStatus("Učitavam reči...");
    const res = await fetch(API_URL);
    words = await res.json();
    localStorage.setItem("cachedWords", JSON.stringify(words));
    renderList();
    setStatus("Reči su učitane. Ukupno: " + words.length);
  }catch(e){
    const cached = localStorage.getItem("cachedWords");
    if(cached){
      words = JSON.parse(cached);
      renderList();
      setStatus("Google Sheet nije dostupan. Učitane su lokalno sačuvane reči.");
    }else{
      setStatus("Greška: ne mogu da učitam reči.");
    }
  }
}

async function saveToSheet(item){
  await fetch(API_URL, {
    method:"POST",
    mode:"no-cors",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify(item)
  });
}

async function addWord(){
  const en = document.getElementById("enInput").value.trim();
  const read = document.getElementById("readInput").value.trim();
  const sr = document.getElementById("srInput").value.trim();

  if(!en || !sr){
    alert("Upiši englesku reč i srpski prevod.");
    return;
  }

  const item = {en, read, sr};

  words.push(item);
  renderList();

  document.getElementById("enInput").value="";
  document.getElementById("readInput").value="";
  document.getElementById("srInput").value="";

  setStatus("Čuvam u Google Sheet...");
  await saveToSheet(item);
  setStatus("Reč je sačuvana.");
}

async function addBulk(){
  const text = document.getElementById("bulkInput").value.trim();

  if(!text){
    alert("Unesi listu reči.");
    return;
  }

  const lines = text.split("\n");
  let count = 0;

  setStatus("Čuvam listu...");

  for(const line of lines){
    let parts = [];

    if(line.includes("|")){
      parts = line.split("|");
    }else if(line.includes("=")){
      const temp = line.split("=");
      parts = [temp[0], "", temp.slice(1).join("=")];
    }else if(line.includes("-")){
      const temp = line.split("-");
      parts = [temp[0], "", temp.slice(1).join("-")];
    }

    if(parts.length >= 3){
      const en = parts[0].trim();
      const read = parts[1].trim();
      const sr = parts.slice(2).join(" ").trim();

      if(en && sr){
        const item = {en, read, sr};
        words.push(item);
        await saveToSheet(item);
        count++;
      }
    }
  }

  document.getElementById("bulkInput").value="";
  renderList();
  setStatus("Sačuvano reči: " + count);
}

function renderList(){
  const list = document.getElementById("wordList");

  if(words.length === 0){
    list.innerHTML = "<div class='hint'>Još nema učitanih reči.</div>";
    return;
  }

  list.innerHTML = words.map(w=>`
    <div class="item">
      <span>
        <b>${w.en}</b>
        ${w.read ? `<small> ${w.read}</small>` : ""}
        — ${w.sr}
      </span>
    </div>
  `).join("");
}

function shuffle(arr){
  return arr.sort(()=>Math.random()-0.5);
}

function restartPractice(){
  if(words.length === 0){
    document.getElementById("word").innerText="Nema reči";
    document.getElementById("reading").innerText="";
    document.getElementById("counter").innerText="";
    document.getElementById("directionText").innerText="Prvo učitaj ili dodaj reči.";
    document.getElementById("answer").style.display="none";
    document.getElementById("score").innerText="";
    return;
  }

  practiceWords = shuffle([...words]);
  index = 0;
  correct = 0;
  wrong = 0;
  document.getElementById("answer").style.display="block";
  showWord();
}

function showWord(){
  answered = false;
  direction = Math.random() < 0.5 ? "en-sr" : "sr-en";

  const item = practiceWords[index];

  document.getElementById("counter").innerText =
    `Reč ${index + 1} od ${practiceWords.length}`;

  document.getElementById("result").innerHTML="";
  document.getElementById("nextBtn").style.display="none";
  document.getElementById("answer").value="";

  if(direction === "en-sr"){
    document.getElementById("directionText").innerText="Prevedi na srpski";
    document.getElementById("word").innerText=item.en;
    document.getElementById("reading").innerText=item.read || "";
    document.getElementById("answer").placeholder="upiši srpski prevod";
  }else{
    document.getElementById("directionText").innerText="Prevedi na engleski";
    document.getElementById("word").innerText=item.sr;
    document.getElementById("reading").innerText="";
    document.getElementById("answer").placeholder="upiši englesku reč";
  }

  updateScore();
  document.getElementById("answer").focus();
}

function checkAnswer(){
  if(answered) return;

  answered = true;

  const item = practiceWords[index];
  const user = normalize(document.getElementById("answer").value);
  const correctAnswer = direction === "en-sr" ? item.sr : item.en;

  if(user === normalize(correctAnswer)){
    correct++;
    document.getElementById("result").innerHTML =
      `<div class="correct">Tačno ✅</div>`;
  }else{
    wrong++;
    document.getElementById("result").innerHTML =
      `<div class="wrong">Netačno ❌</div>
       <div>Tačan odgovor je:</div>
       <div class="answer">${correctAnswer}</div>
       ${direction === "sr-en" && item.read ? `<div class="reading">${item.read}</div>` : ""}`;
  }

  document.getElementById("nextBtn").style.display="block";
  updateScore();
}

function nextWord(){
  index++;

  if(index >= practiceWords.length){
    const total = correct + wrong;
    const percent = total ? Math.round((correct / total) * 100) : 0;

    document.getElementById("word").innerText="Vežba završena";
    document.getElementById("reading").innerText="";
    document.getElementById("directionText").innerText="";
    document.getElementById("counter").innerText="";
    document.getElementById("answer").style.display="none";
    document.getElementById("nextBtn").style.display="none";

    document.getElementById("result").innerHTML =
      `<div class="answer">Rezultat: ${correct}/${total} tačno (${percent}%)</div>
       <button class="green" onclick="restartPractice()">Ponovi vežbu</button>`;

    return;
  }

  showWord();
}

function updateScore(){
  const total = correct + wrong;
  const percent = total ? Math.round((correct / total) * 100) : 0;

  document.getElementById("score").innerText =
    `Tačno: ${correct} | Netačno: ${wrong} | Tačnost: ${percent}%`;
}

document.getElementById("answer").addEventListener("keydown",function(e){
  if(e.key === "Enter"){
    if(!answered){
      checkAnswer();
    }else{
      nextWord();
    }
  }
});

loadWords();
</script>

</body>
</html>
