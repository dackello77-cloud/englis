<!DOCTYPE html>
<html lang="sr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Conversation Trainer </title>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:Arial,sans-serif}
body{background:#0f172a;color:white}
.app{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:16px}
.card{width:100%;max-width:720px;background:#1e293b;border-radius:22px;padding:22px;text-align:center}
.title{font-size:25px;color:#38bdf8;font-weight:bold;margin-bottom:10px}
.menu{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:15px 0}
button{border:none;border-radius:14px;padding:14px;font-size:17px;font-weight:bold;cursor:pointer}
.menu button{background:#334155;color:white}
.menu button:hover{background:#475569}
.counter{color:#94a3b8;margin:10px 0}
.scene{background:#0f172a;border:1px solid #334155;border-radius:16px;padding:14px;margin:12px 0;color:#cbd5e1;text-align:left;line-height:1.5}
.task{font-size:23px;font-weight:bold;margin:18px 0;line-height:1.4}
input{width:100%;padding:15px;border:none;border-radius:14px;font-size:18px;text-align:center;outline:none}
.check{background:#22c55e;color:#052e16;width:100%;margin-top:10px}
.next{background:#38bdf8;color:#020617;width:100%;margin-top:10px;display:none}
.back{background:#64748b;color:white;width:100%;margin-top:10px}
.result{margin-top:15px;min-height:70px}
.correct{color:#22c55e;font-weight:bold}
.wrong{color:#f87171;font-weight:bold}
.answer{color:#facc15;font-size:20px;margin-top:7px;line-height:1.4}
.explain{background:#0f172a;border:1px solid #334155;border-radius:14px;padding:12px;margin-top:10px;text-align:left;color:#cbd5e1;line-height:1.45}
.log{max-height:180px;overflow:auto;background:#020617;border-radius:14px;padding:10px;margin-top:12px;text-align:left;color:#cbd5e1;font-size:14px}
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:12px 0}
.stat{background:#0f172a;border:1px solid #334155;border-radius:14px;padding:10px;color:#cbd5e1}
.stat b{display:block;color:white;font-size:20px}
@media(max-width:520px){.menu{grid-template-columns:1fr}.task{font-size:20px}}
</style>
</head>

<body>
<div class="app">
<div class="card">

<div class="title">Conversation Trainer</div>

<div id="startScreen">
  <div class="scene">
    Izaberi situaciju. Svaki put aplikacija pravi malo drugačiji razgovor kroz 10 koraka.
    Ti prevodiš srpsku rečenicu na engleski.
  </div>

  <div class="menu">
    <button onclick="startScenario('shop')">🛒 Prodavnica</button>
    <button onclick="startScenario('restaurant')">🍽 Restoran</button>
    <button onclick="startScenario('hotel')">🏨 Hotel</button>
    <button onclick="startScenario('airport')">✈️ Aerodrom</button>
  </div>
</div>

<div id="trainer" style="display:none">
  <div class="counter" id="counter"></div>

  <div class="stats">
    <div class="stat">Tačno <b id="correctBox">0</b></div>
    <div class="stat">Netačno <b id="wrongBox">0</b></div>
    <div class="stat">Tačnost <b id="percentBox">0%</b></div>
  </div>

  <div class="scene" id="context"></div>
  <div class="task" id="task"></div>

  <input id="answer" placeholder="upiši na engleskom">

  <button class="check" onclick="checkAnswer()">Check</button>
  <button class="next" id="nextBtn" onclick="nextStep()">Next</button>

  <div class="result" id="result"></div>

  <div class="log" id="log"></div>

  <button class="back" onclick="goBack()">⬅ Nazad na izbor</button>
</div>

</div>
</div>

let scenario="";
let path=[];
let step=0;
let answered=false;
let correct=0;
let wrong=0;

function normalize(t){
return t.toLowerCase().trim()
.replace(/[.!?,]/g,"")
.replace(/’/g,"'")
.replace(/\s+/g," ");
}

function pick(arr){
return arr[Math.floor(Math.random()*arr.length)];
}

function startScenario(name){
scenario=name;
path=data[name].map(stepOptions=>pick(stepOptions));
step=0;
answered=false;
correct=0;
wrong=0;
document.getElementById("startScreen").style.display="none";
document.getElementById("trainer").style.display="block";
document.getElementById("log").innerHTML="";
showStep();
}

function scenarioName(){
if(scenario==="shop")return"Prodavnica";
if(scenario==="restaurant")return"Restoran";
if(scenario==="hotel")return"Hotel";
if(scenario==="airport")return"Aerodrom";
return"";
}

function showStep(){
answered=false;
let item=path[step];

document.getElementById("counter").innerText=`${scenarioName()} | Korak ${step+1}/10`;
document.getElementById("context").innerHTML=`Prevedi na engleski. Razgovor se razvija korak po korak.`;
document.getElementById("task").innerText=item.sr;
document.getElementById("answer").value="";
document.getElementById("result").innerHTML="";
document.getElementById("nextBtn").style.display="none";
document.querySelector(".check").style.display="block";
document.getElementById("answer").focus();

updateStats();
}

function checkAnswer(){
if(answered)return;
answered=true;

let item=path[step];
let user=normalize(document.getElementById("answer").value);
let expected=normalize(item.en);

if(user===expected){
correct++;
document.getElementById("result").innerHTML=`<div class="correct">Tačno ✅</div><div class="answer">${item.en}</div>`;
}else{
wrong++;
document.getElementById("result").innerHTML=`
<div class="wrong">Netačno ❌</div>
<div>Tačno je:</div>
<div class="answer">${item.en}</div>
<div class="explain"><b>Objašnjenje:</b><br>${item.ex}</div>`;
}

document.getElementById("log").innerHTML+=`
<div><b>SR:</b> ${item.sr}</div>
<div><b>EN:</b> ${item.en}</div><hr style="border:0;border-top:1px solid #334155;margin:8px 0">
`;

document.querySelector(".check").style.display="none";
document.getElementById("nextBtn").style.display="block";
updateStats();
}

function nextStep(){
step++;
if(step>=10){
finishConversation();
return;
}
showStep();
}

function finishConversation(){
document.getElementById("counter").innerText=`${scenarioName()} završen`;
document.getElementById("context").innerHTML="";
document.getElementById("task").innerText="Razgovor je završen ✅";
document.getElementById("answer").style.display="none";
document.querySelector(".check").style.display="none";
document.getElementById("nextBtn").style.display="none";

let total=correct+wrong;
let percent=total?Math.round((correct/total)*100):0;

document.getElementById("result").innerHTML=`
<div class="answer">Rezultat: ${correct}/${total} tačno (${percent}%)</div>
<button class="check" onclick="restartSame()">Ponovi istu situaciju novim putem</button>
<button class="back" onclick="goBack()">Izaberi drugu situaciju</button>
`;
}

function restartSame(){
document.getElementById("answer").style.display="block";
startScenario(scenario);
}

function goBack(){
document.getElementById("trainer").style.display="none";
document.getElementById("startScreen").style.display="block";
document.getElementById("answer").style.display="block";
}

function updateStats(){
let total=correct+wrong;
let percent=total?Math.round((correct/total)*100):0;
document.getElementById("correctBox").innerText=correct;
document.getElementById("wrongBox").innerText=wrong;
document.getElementById("percentBox").innerText=percent+"%";
}

document.getElementById("answer").addEventListener("keydown",function(e){
if(e.key==="Enter"){
if(!answered)checkAnswer();
else nextStep();
}
});
</script>

</html>
