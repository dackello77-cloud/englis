.next{background:#38bdf8;color:#020617;display:none}
.result{margin-top:15px;min-height:72px}
.correct{color:#22c55e;font-weight:bold}
.wrong{color:#f87171;font-weight:bold}
.answer{color:#facc15;font-size:21px;margin-top:7px;line-height:1.4}

const setSize = 20;
let questions = shuffleArray([...questionBank]);
let setIndex = Number(localStorage.getItem("prep240SetIndexV2")) || 0;
let currentSet = [];
let currentIndex = 0;
let answered = false;
let correctCount = Number(localStorage.getItem("prep240CorrectV2")) || 0;
let wrongCount = Number(localStorage.getItem("prep240WrongV2")) || 0;

function shuffleArray(arr){
  return arr.sort(() => Math.random() - 0.5);
}

function normalize(text){
  return text.toLowerCase().trim()
    .replace(/[.!?,]/g,"")
    .replace(/\s+/g," ");
}

function loadSet(){
  const start = setIndex * setSize;
  currentSet = questions.slice(start,start+setSize);

  if(currentSet.length === 0){
    setIndex = 0;
    localStorage.setItem("prep240SetIndexV2",0);
    currentSet = questions.slice(0,setSize);
  }

  currentIndex = 0;
  showItem();
}

function renderChoices(correct){
  let wrongOptions = allPrepositions.filter(p => p !== correct);
  let options = shuffleArray([
    correct,
    ...shuffleArray(wrongOptions).slice(0,2)
  ]);

  document.getElementById("choices").innerHTML = options.map(opt =>
    `<button onclick="quickAnswer('${opt}')">${opt}</button>`
  ).join("");
}

function showItem(){
  answered = false;
  const q = currentSet[currentIndex];

  document.getElementById("counter").innerText =
    `Set ${setIndex+1} | Pitanje ${currentIndex+1}/${currentSet.length} | Ukupno primera: ${questions.length}`;

  document.getElementById("phaseText").innerText = "Upiši predlog koji nedostaje";
  document.getElementById("serbian").innerText = q.sr;
  document.getElementById("question").innerHTML =
    q.en.replace("___", `<span class="blank">___</span>`);

  document.getElementById("answer").value = "";
  document.getElementById("result").innerHTML = "";
  document.getElementById("nextBtn").style.display = "none";
  document.querySelector(".check").style.display = "block";
  document.getElementById("answer").style.display = "block";

  renderChoices(q.p);
  updateStats();
  document.getElementById("answer").focus();
}

function quickAnswer(value){
  if(answered) return;
  document.getElementById("answer").value = value;
  checkAnswer();
}

function checkAnswer(){
  if(answered) return;
  answered = true;

  const q = currentSet[currentIndex];
  const user = normalize(document.getElementById("answer").value);
  const correct = normalize(q.p);
  const fullSentence = q.en.replace("___", q.p);

  if(user === correct){
    correctCount++;
    document.getElementById("result").innerHTML =
      `<div class="correct">Tačno ✅</div>
       <div class="answer">${fullSentence}</div>`;
  }else{
    wrongCount++;
    document.getElementById("result").innerHTML =
      `<div class="wrong">Netačno ❌</div>
       <div>Tačno je:</div>
       <div class="answer">${q.p}</div>
       <div class="answer">${fullSentence}</div>
       <div class="explain"><b>Objašnjenje:</b><br>${q.rule}</div>`;
  }

  localStorage.setItem("prep240CorrectV2",correctCount);
  localStorage.setItem("prep240WrongV2",wrongCount);

  updateStats();
  document.querySelector(".check").style.display = "none";
  document.getElementById("nextBtn").style.display = "block";
}

function nextItem(){
  currentIndex++;

  if(currentIndex >= currentSet.length){
    finishSet();
    return;
  }

  showItem();
}

function finishSet(){
  document.getElementById("phaseText").innerText = "";
  document.getElementById("serbian").innerText = "";
  document.getElementById("question").innerText = "Set završen";
  document.getElementById("answer").style.display = "none";
  document.querySelector(".check").style.display = "none";
  document.getElementById("nextBtn").style.display = "none";
  document.getElementById("choices").innerHTML = "";

  document.getElementById("result").innerHTML =
    `<button onclick="loadSet()" style="background:#facc15;color:#111827">Ponovi set</button>
     <button onclick="nextSet()" style="background:#22c55e;color:#052e16">Sledeći set</button>`;
}

function nextSet(){
  setIndex++;
  localStorage.setItem("prep240SetIndexV2",setIndex);
  loadSet();
}

function prevSet(){
  if(setIndex > 0) setIndex--;
  localStorage.setItem("prep240SetIndexV2",setIndex);
  loadSet();
}

function updateStats(){
  const total = correctCount + wrongCount;
  const percent = total ? Math.round((correctCount / total) * 100) : 0;

  document.getElementById("correctBox").innerText = correctCount;
  document.getElementById("wrongBox").innerText = wrongCount;
  document.getElementById("percentBox").innerText = percent + "%";
}

function resetStats(){
  correctCount = 0;
  wrongCount = 0;
  localStorage.setItem("prep240CorrectV2",0);
  localStorage.setItem("prep240WrongV2",0);
  updateStats();
  document.getElementById("result").innerHTML =
    `<div class="answer">Score je resetovan.</div>`;
}

document.getElementById("answer").addEventListener("keydown",function(e){
  if(e.key === "Enter"){
    if(!answered) checkAnswer();
    else nextItem();
  }
});

loadSet();
</script>
