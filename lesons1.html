<!DOCTYPE html>
<html lang="sr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Medium City Trainer</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:Arial,sans-serif}
body{background:#0f172a;color:white}
.app{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:18px}
.card{width:100%;max-width:560px;background:#1e293b;border-radius:22px;padding:24px;text-align:center}
.title{font-size:24px;color:#38bdf8;font-weight:bold;margin-bottom:8px}
.counter,.phase{color:#94a3b8;margin-bottom:10px}
.word{font-size:30px;font-weight:bold;margin:22px 0;line-height:1.35}
input{width:100%;padding:15px;border:none;border-radius:14px;font-size:18px;text-align:center;outline:none}
button{width:100%;padding:14px;border:none;border-radius:14px;margin-top:10px;font-size:17px;font-weight:bold;cursor:pointer}
.check{background:#22c55e;color:#052e16}
.voice{background:#a855f7;color:white}
.next{background:#38bdf8;color:#020617;display:none}
.result{margin-top:15px;min-height:55px}
.correct{color:#22c55e;font-weight:bold}
.wrong{color:#f87171;font-weight:bold}
.answer{color:#facc15;font-size:20px;margin-top:7px}
.nav{display:flex;gap:10px;margin-top:12px}
.nav button{background:#64748b;color:white}
.small{font-size:14px;color:#cbd5e1;margin-top:8px}
</style>
</head>

<body>
<div class="app">
<div class="card">
  <div class="title">Medium City Trainer</div>
  <div class="counter" id="counter"></div>
  <div class="phase" id="phase"></div>

  <div class="word" id="word"></div>

  <input id="answer" placeholder="upiši ili izgovori odgovor">
  <button class="voice" onclick="focusInput()">🎤 Use phone microphone</button>
  <button class="check" onclick="check()">Check</button>
  <button class="next" id="nextBtn" onclick="next()">Next</button>

  <div class="result" id="result"></div>
  <div class="small" id="hint"></div>

  <div class="nav">
    <button onclick="prevSet()">⬅ Previous set</button>
    <button onclick="nextSet()">Next set ➡</button>
  </div>
</div>
</div>

const setSize=10;
let setIndex=Number(localStorage.getItem("mediumCitySet"))||0;
let phase=1,index=0,set=[],sentenceSet=[],answered=false;

function normalize(t){
return t.toLowerCase().trim()
.replace(/[.!?,]/g,"")
.replace(/č/g,"c").replace(/ć/g,"c").replace(/š/g,"s")
.replace(/đ/g,"dj").replace(/ž/g,"z")
.replace(/\s+/g," ");
}

function loadSet(){
let start=setIndex*setSize;
set=lessons.slice(start,start+setSize);
if(set.length===0){setIndex=0;localStorage.setItem("mediumCitySet",0);loadSet();return;}
sentenceSet=set.map(item=>item.sentences[Math.floor(Math.random()*item.sentences.length)]);
phase=1;index=0;show();
}

let direction = "en-sr";

function show(){
  answered=false;
  answer.style.display="block";
  document.querySelector(".check").style.display="block";
  document.querySelector(".voice").style.display="block";
  answer.value="";
  result.innerHTML="";
  hint.innerHTML="";
  nextBtn.style.display="none";

  direction = Math.random() < 0.5 ? "en-sr" : "sr-en";

  if(phase===1){
    phaseEl("Faza 1: pojmovi MIX ENG ↔ SRB");
    counter.innerText=`Set ${setIndex+1} | Pojam ${index+1}/${set.length}`;

    if(direction==="en-sr"){
      word.innerText=set[index].word;
      answer.placeholder="upiši prevod na srpskom";
    }else{
      word.innerText=set[index].sr;
      answer.placeholder="upiši prevod na engleskom";
    }
  }else{
    phaseEl("Faza 2: rečenice MIX ENG ↔ SRB");
    counter.innerText=`Set ${setIndex+1} | Rečenica ${index+1}/${sentenceSet.length}`;

    if(direction==="en-sr"){
      word.innerText=sentenceSet[index].en;
      answer.placeholder="upiši prevod na srpskom";
    }else{
      word.innerText=sentenceSet[index].sr;
      answer.placeholder="upiši prevod na engleskom";
    }
  }

  answer.focus();
}

function check(){
  if(answered)return;
  answered=true;

  let user=normalize(answer.value);
  let correct="";

  if(phase===1){
    correct = direction==="en-sr" ? set[index].sr : set[index].word;
  }else{
    correct = direction==="en-sr" ? sentenceSet[index].sr : sentenceSet[index].en;
  }

  if(user===normalize(correct)){
    result.innerHTML=`<div class="correct">Tačno ✅</div>`;
  }else{
    result.innerHTML=`
      <div class="wrong">Netačno ❌</div>
      <div>Tačno je:</div>
      <div class="answer">${correct}</div>
    `;
  }

  nextBtn.style.display="block";
}

function next(){
index++;
if(phase===1 && index>=set.length){phase=2;index=0;}
else if(phase===2 && index>=sentenceSet.length){finish();return;}
show();
}

function finish(){
word.innerText="Set završen";
counter.innerText=`Set ${setIndex+1}`;
phase.innerText="";
answer.style.display="none";
document.querySelector(".check").style.display="none";
document.querySelector(".voice").style.display="none";
nextBtn.style.display="none";
result.innerHTML=`<button onclick="loadSet()" style="background:#facc15;color:#111827">Ponovi set</button>
<button onclick="nextSet()" style="background:#22c55e;color:#052e16">Sledeći set</button>`;
}

function nextSet(){
setIndex++;
localStorage.setItem("mediumCitySet",setIndex);
loadSet();
}

function prevSet(){
if(setIndex>0)setIndex--;
localStorage.setItem("mediumCitySet",setIndex);
loadSet();
}
function focusInput(){

  document.getElementById("answer").focus();

}
function startVoice(){
const SpeechRecognition=window.SpeechRecognition||window.webkitSpeechRecognition;
if(!SpeechRecognition){alert("Voice ne radi u ovom browseru. Probaj Chrome.");return;}
const rec=new SpeechRecognition();
rec.lang = direction === "sr-en" ? "en-US" : "sr-RS";
rec.interimResults=false;
rec.maxAlternatives=1;
hint.innerText="Slušam...";
rec.start();
rec.onresult=e=>{
answer.value=e.results[0][0].transcript;
hint.innerText="";
check();
};
rec.onerror=()=>{hint.innerText="Nisam dobro čuo. Probaj ponovo.";};
}

answer.addEventListener("keydown",e=>{
if(e.key==="Enter"){
if(!answered)check();
else next();
}
});

loadSet();

</html>
