const setSize = 30;
let setIndex = Number(localStorage.getItem("setIndex")) || 0;
let words = [];
let index = 0;
let correct = 0;
let wrong = 0;
let answered = false;

function normalize(text) {
  return text.toLowerCase().trim()
    .replace(/č/g,"c").replace(/ć/g,"c").replace(/š/g,"s")
    .replace(/đ/g,"dj").replace(/ž/g,"z");
}

function shuffle(array) {
  return array.sort(() => Math.random() - 0.5);
}

function loadSet() {
  const start = setIndex * setSize;
  const end = start + setSize;

  words = allWords.slice(start, end);

  if (words.length === 0) {
    setIndex = 0;
    localStorage.setItem("setIndex", setIndex);
    words = allWords.slice(0, setSize);
  }

  shuffle(words);
  index = 0;
  correct = 0;
  wrong = 0;
  showWord();
}

function showWord() {
  answered = false;

  document.getElementById("word").innerText = words[index].en;
  document.getElementById("counter").innerText =
    `Set ${setIndex + 1} | Reč ${index + 1} od ${words.length}`;

  document.getElementById("answer").value = "";
  document.getElementById("result").innerHTML = "";
  document.getElementById("nextBtn").style.display = "none";

  document.querySelector(".check").style.display = "block";
  document.getElementById("answer").focus();

  updateScore();
}

function checkAnswer() {
  if (answered) return;

  const userAnswer = normalize(document.getElementById("answer").value);
  const correctAnswer = normalize(words[index].sr);
  const result = document.getElementById("result");

  answered = true;

  if (userAnswer === correctAnswer) {
    correct++;
    result.innerHTML = `<div class="correct">Tačno ✅</div>`;
  } else {
    wrong++;
    result.innerHTML = `
      <div class="wrong">Netačno ❌</div>
      <div>Tačan prevod je:</div>
      <div class="translation">${words[index].sr}</div>
    `;
  }

  document.querySelector(".check").style.display = "none";
  document.getElementById("nextBtn").style.display = "block";
  updateScore();
}

function nextWord() {
  index++;

  if (index >= words.length) {
    document.getElementById("word").innerText = "Set završen";
    document.getElementById("counter").innerText = `Set ${setIndex + 1}`;
    document.getElementById("answer").style.display = "none";
    document.querySelector(".check").style.display = "none";

    document.getElementById("result").innerHTML = `
      <div class="correct">Rezultat: ${correct} tačno / ${wrong} netačno</div>
      <button onclick="repeatSet()" style="background:#facc15;color:#111827;">Ponovi ovaj set</button>
      <button onclick="nextSet()" style="background:#22c55e;color:#052e16;">Sledeći set</button>
    `;

    document.getElementById("nextBtn").style.display = "none";
    return;
  }

  showWord();
}

function repeatSet() {
  document.getElementById("answer").style.display = "block";
  loadSet();
}

function nextSet() {
  setIndex++;
  localStorage.setItem("setIndex", setIndex);

  document.getElementById("answer").style.display = "block";
  loadSet();
}

function updateScore() {
  document.getElementById("score").innerText =
    `Tačno: ${correct} | Netačno: ${wrong}`;
}

document.getElementById("answer").addEventListener("keydown", function(e) {
  if (e.key === "Enter") {
    if (!answered) {
      checkAnswer();
    } else {
      nextWord();
    }
  }
});

loadSet();
